# Proof of Play - Local Development Configuration
# Copy to config/local.toml and adjust as needed:
#   cp config/local.example.toml config/local.toml

[db_settings]
data_folder = "./data"
migrations_folder = "./crates/server/migrations"

[api_settings]
domain = "127.0.0.1"
port = "8900"
private_key_file = "./creds/private.pem"
# Voltage API settings (used when ln_settings.provider = "voltage")
voltage_api_key = ""
voltage_api_url = "https://voltageapi.com/v1/"
voltage_org_id = ""
voltage_env_id = ""
voltage_wallet_id = ""

[ui_settings]
remote_url = "http://127.0.0.1:8900"
ui_dir = "./ui"

[ln_settings]
# Lightning provider: "voltage" or "lnd"
provider = "lnd"

# LND settings (used when provider = "lnd")
lnd_base_url = "https://your-lnd-node.example.com"
# NOTE: use absolute path — shell variables like $HOME are not expanded
lnd_macaroon_path = "/path/to/admin.macaroon"
# Optional: only needed for self-signed TLS certs
# lnd_tls_cert_path = "/path/to/tls.cert"

[competition_settings]
# Competition window: scores within duration_secs after start_time count
# Winner is determined shortly after the duration expires
start_time = "00:00"
duration_secs = 86400
# How often to check if it's time to process winners (in seconds)
# Entry fee per game in sats
entry_fee_sats = 500
# Percentage of entry fees that go to the prize pool (remainder goes to server)
prize_pool_pct = 90

[admin]
# CIDR subnets allowed to access /admin dashboard
allowed_subnets = ["10.100.0.0/24", "127.0.0.1/32", "::1/128"]

# For testing payouts quickly, use a short window:
# start_time = "22:00"
# duration_secs = 600
