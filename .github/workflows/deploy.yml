name: Deploy

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build only, no deploy)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"
  APP_DIR: "/opt/proofofscore"

jobs:
  build-and-deploy:
    name: Build & Deploy (aarch64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force || true

      - name: Cache SQLite installation
        id: sqlite-cache
        uses: actions/cache@v4
        with:
          key: sqlite-3500400-v2-${{ runner.os }}-arm64
          path: ${{ github.workspace }}/.sqlite

      - name: Install SQLite with sqlx features
        if: steps.sqlite-cache.outputs.cache-hit != 'true'
        run: |
          wget https://www.sqlite.org/2025/sqlite-autoconf-3500400.tar.gz
          tar xzf sqlite-autoconf-3500400.tar.gz
          cd sqlite-autoconf-3500400
          ./configure --prefix=${{ github.workspace }}/.sqlite \
              --enable-threadsafe \
              CFLAGS="-DSQLITE_ENABLE_UNLOCK_NOTIFY=1 \
                      -DSQLITE_ENABLE_COLUMN_METADATA=1 \
                      -DSQLITE_ENABLE_DBSTAT_VTAB=1 \
                      -DSQLITE_ENABLE_FTS3=1 \
                      -DSQLITE_ENABLE_FTS4=1 \
                      -DSQLITE_ENABLE_FTS5=1 \
                      -DSQLITE_ENABLE_JSON1=1 \
                      -DSQLITE_ENABLE_RTREE=1 \
                      -DSQLITE_ENABLE_MATH_FUNCTIONS=1 \
                      -DSQLITE_ENABLE_STAT4=1"
          make -j$(nproc)
          make install
          cd ..
          rm -rf sqlite-autoconf-3500400 sqlite-autoconf-3500400.tar.gz

      - name: Set SQLite environment
        run: |
          echo "${{ github.workspace }}/.sqlite/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/.sqlite/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${{ github.workspace }}/.sqlite/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "SQLITE3_LIB_DIR=${{ github.workspace }}/.sqlite/lib" >> $GITHUB_ENV
          echo "SQLITE3_INCLUDE_DIR=${{ github.workspace }}/.sqlite/include" >> $GITHUB_ENV

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --bin server

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM modules
        run: |
          wasm-pack build crates/nostr_signer --target web --release --out-dir ../../ui/pkg/nostr_signer
          wasm-pack build crates/game_engine --target web --release --out-dir ../../ui/pkg/game_engine

      - name: Verify build artifacts
        run: |
          ls -lh target/release/server
          ls -la crates/server/static/
          ls -la ui/pkg/nostr_signer/
          ls -la ui/pkg/game_engine/
          file target/release/server

      - name: Prepare deployment package
        run: |
          mkdir -p deploy/bin deploy/ui/pkg deploy/static deploy/migrations

          cp target/release/server deploy/bin/
          cp -r ui/pkg/* deploy/ui/pkg/
          cp -r crates/server/static/* deploy/static/
          cp -r crates/server/migrations/* deploy/migrations/

          echo "Deployment package:"
          find deploy -type f | head -30

      - name: Deploy to server
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          RSYNC="rsync -avz --delete -e '$SSH'"

          # Stop the service
          $SSH ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "systemctl stop proofofscore || true"

          # Deploy binary
          $SSH ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "mkdir -p $APP_DIR/{bin,ui/pkg,static,migrations,data,backups,config,secrets,creds}"
          rsync -avz -e "$SSH" deploy/bin/server ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$APP_DIR/bin/
          $SSH ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "chmod +x $APP_DIR/bin/server"

          # Deploy UI assets
          rsync -avz --delete -e "$SSH" deploy/ui/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$APP_DIR/ui/

          # Deploy static files
          rsync -avz --delete -e "$SSH" deploy/static/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$APP_DIR/static/

          # Deploy migrations
          rsync -avz --delete -e "$SSH" deploy/migrations/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:$APP_DIR/migrations/

          # Fix ownership
          $SSH ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "chown -R proofofscore:proofofscore $APP_DIR"

          # Start the service
          $SSH ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "systemctl start proofofscore"

          echo "Deployment complete!"

      - name: Verify deployment
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          for i in $(seq 1 10); do
            status=$($SSH ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "systemctl is-active proofofscore" 2>&1) || true
            if [ "$status" = "active" ]; then
              echo "Service is running!"
              exit 0
            fi
            echo "Attempt $i: service status is '$status', retrying in 5s..."
            sleep 5
          done
          echo "Service failed to become active after 50s (last status: $status)"
          exit 1

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
