name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  SQLX_OFFLINE: true
  SQLITE_DIR: ${{ github.workspace }}/.sqlite

jobs:
  # Format check (fast, no deps needed)
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - run: cargo fmt --all -- --check

  # Unused dependency check
  machete:
    name: Machete
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-machete
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-machete

      - run: cargo machete --with-metadata

  # Clippy lint check
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache SQLite installation
        id: sqlite-cache
        uses: actions/cache@v4
        with:
          key: sqlite-3500400-v2-${{ runner.os }}
          path: ${{ env.SQLITE_DIR }}

      - name: Install SQLite with sqlx features
        if: steps.sqlite-cache.outputs.cache-hit != 'true'
        run: |
          wget https://www.sqlite.org/2025/sqlite-autoconf-3500400.tar.gz
          tar xzf sqlite-autoconf-3500400.tar.gz
          cd sqlite-autoconf-3500400
          ./configure --prefix=${{ env.SQLITE_DIR }} \
              --enable-threadsafe \
              CFLAGS="-DSQLITE_ENABLE_UNLOCK_NOTIFY=1 \
                      -DSQLITE_ENABLE_COLUMN_METADATA=1 \
                      -DSQLITE_ENABLE_DBSTAT_VTAB=1 \
                      -DSQLITE_ENABLE_FTS3=1 \
                      -DSQLITE_ENABLE_FTS4=1 \
                      -DSQLITE_ENABLE_FTS5=1 \
                      -DSQLITE_ENABLE_JSON1=1 \
                      -DSQLITE_ENABLE_RTREE=1 \
                      -DSQLITE_ENABLE_MATH_FUNCTIONS=1 \
                      -DSQLITE_ENABLE_STAT4=1"
          make -j$(nproc)
          make install
          cd ..
          rm -rf sqlite-autoconf-3500400 sqlite-autoconf-3500400.tar.gz

      - name: Set SQLite environment
        run: |
          echo "${{ env.SQLITE_DIR }}/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=${{ env.SQLITE_DIR }}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${{ env.SQLITE_DIR }}/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "SQLITE3_LIB_DIR=${{ env.SQLITE_DIR }}/lib" >> $GITHUB_ENV
          echo "SQLITE3_INCLUDE_DIR=${{ env.SQLITE_DIR }}/include" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo clippy --workspace --all-targets -- -D warnings

  # Unit tests
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache SQLite installation
        id: sqlite-cache
        uses: actions/cache@v4
        with:
          key: sqlite-3500400-v2-${{ runner.os }}
          path: ${{ env.SQLITE_DIR }}

      - name: Install SQLite with sqlx features
        if: steps.sqlite-cache.outputs.cache-hit != 'true'
        run: |
          wget https://www.sqlite.org/2025/sqlite-autoconf-3500400.tar.gz
          tar xzf sqlite-autoconf-3500400.tar.gz
          cd sqlite-autoconf-3500400
          ./configure --prefix=${{ env.SQLITE_DIR }} \
              --enable-threadsafe \
              CFLAGS="-DSQLITE_ENABLE_UNLOCK_NOTIFY=1 \
                      -DSQLITE_ENABLE_COLUMN_METADATA=1 \
                      -DSQLITE_ENABLE_DBSTAT_VTAB=1 \
                      -DSQLITE_ENABLE_FTS3=1 \
                      -DSQLITE_ENABLE_FTS4=1 \
                      -DSQLITE_ENABLE_FTS5=1 \
                      -DSQLITE_ENABLE_JSON1=1 \
                      -DSQLITE_ENABLE_RTREE=1 \
                      -DSQLITE_ENABLE_MATH_FUNCTIONS=1 \
                      -DSQLITE_ENABLE_STAT4=1"
          make -j$(nproc)
          make install
          cd ..
          rm -rf sqlite-autoconf-3500400 sqlite-autoconf-3500400.tar.gz

      - name: Set SQLite environment
        run: |
          echo "${{ env.SQLITE_DIR }}/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=${{ env.SQLITE_DIR }}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${{ env.SQLITE_DIR }}/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "SQLITE3_LIB_DIR=${{ env.SQLITE_DIR }}/lib" >> $GITHUB_ENV
          echo "SQLITE3_INCLUDE_DIR=${{ env.SQLITE_DIR }}/include" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - run: cargo test --workspace --locked

  # Build (x86_64) + WASM
  build-x86_64:
    name: Build (x86_64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force || true

      - name: Cache SQLite installation
        id: sqlite-cache
        uses: actions/cache@v4
        with:
          key: sqlite-3500400-v2-${{ runner.os }}
          path: ${{ env.SQLITE_DIR }}

      - name: Install SQLite with sqlx features
        if: steps.sqlite-cache.outputs.cache-hit != 'true'
        run: |
          wget https://www.sqlite.org/2025/sqlite-autoconf-3500400.tar.gz
          tar xzf sqlite-autoconf-3500400.tar.gz
          cd sqlite-autoconf-3500400
          ./configure --prefix=${{ env.SQLITE_DIR }} \
              --enable-threadsafe \
              CFLAGS="-DSQLITE_ENABLE_UNLOCK_NOTIFY=1 \
                      -DSQLITE_ENABLE_COLUMN_METADATA=1 \
                      -DSQLITE_ENABLE_DBSTAT_VTAB=1 \
                      -DSQLITE_ENABLE_FTS3=1 \
                      -DSQLITE_ENABLE_FTS4=1 \
                      -DSQLITE_ENABLE_FTS5=1 \
                      -DSQLITE_ENABLE_JSON1=1 \
                      -DSQLITE_ENABLE_RTREE=1 \
                      -DSQLITE_ENABLE_MATH_FUNCTIONS=1 \
                      -DSQLITE_ENABLE_STAT4=1"
          make -j$(nproc)
          make install
          cd ..
          rm -rf sqlite-autoconf-3500400 sqlite-autoconf-3500400.tar.gz

      - name: Set SQLite environment
        run: |
          echo "${{ env.SQLITE_DIR }}/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=${{ env.SQLITE_DIR }}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${{ env.SQLITE_DIR }}/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "SQLITE3_LIB_DIR=${{ env.SQLITE_DIR }}/lib" >> $GITHUB_ENV
          echo "SQLITE3_INCLUDE_DIR=${{ env.SQLITE_DIR }}/include" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --release --locked

      - name: Install wasm-pack
        run: cargo install wasm-pack --locked

      - name: Build WASM modules
        run: |
          wasm-pack build crates/nostr_signer --target web --release --out-dir ../public_ui/pkg/nostr_signer
          wasm-pack build crates/game_engine --target web --release --out-dir ../public_ui/pkg/game_engine

      - name: Verify static files were built
        run: |
          echo "Checking build.rs output..."
          ls -la crates/server/static/
          if [ ! -f "crates/server/static/app.min.js" ]; then
            echo "Error: app.min.js not found"
            exit 1
          fi
          echo "Checking WASM output..."
          ls -la crates/public_ui/pkg/nostr_signer/
          ls -la crates/public_ui/pkg/game_engine/
          echo "All artifacts verified"

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: server-x86_64
          path: target/release/server
          retention-days: 7

      - name: Upload UI assets
        uses: actions/upload-artifact@v4
        with:
          name: ui-assets
          path: |
            crates/public_ui/pkg/
            crates/server/static/
          retention-days: 7

  # Build (ARM64) using native ARM runner
  build-arm64:
    name: Build (ARM64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker image prune --all --force || true

      - name: Cache SQLite installation
        id: sqlite-cache
        uses: actions/cache@v4
        with:
          key: sqlite-3500400-v2-${{ runner.os }}-arm64
          path: ${{ env.SQLITE_DIR }}

      - name: Install SQLite with sqlx features
        if: steps.sqlite-cache.outputs.cache-hit != 'true'
        run: |
          wget https://www.sqlite.org/2025/sqlite-autoconf-3500400.tar.gz
          tar xzf sqlite-autoconf-3500400.tar.gz
          cd sqlite-autoconf-3500400
          ./configure --prefix=${{ env.SQLITE_DIR }} \
              --enable-threadsafe \
              CFLAGS="-DSQLITE_ENABLE_UNLOCK_NOTIFY=1 \
                      -DSQLITE_ENABLE_COLUMN_METADATA=1 \
                      -DSQLITE_ENABLE_DBSTAT_VTAB=1 \
                      -DSQLITE_ENABLE_FTS3=1 \
                      -DSQLITE_ENABLE_FTS4=1 \
                      -DSQLITE_ENABLE_FTS5=1 \
                      -DSQLITE_ENABLE_JSON1=1 \
                      -DSQLITE_ENABLE_RTREE=1 \
                      -DSQLITE_ENABLE_MATH_FUNCTIONS=1 \
                      -DSQLITE_ENABLE_STAT4=1"
          make -j$(nproc)
          make install
          cd ..
          rm -rf sqlite-autoconf-3500400 sqlite-autoconf-3500400.tar.gz

      - name: Set SQLite environment
        run: |
          echo "${{ env.SQLITE_DIR }}/bin" >> $GITHUB_PATH
          echo "LD_LIBRARY_PATH=${{ env.SQLITE_DIR }}/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${{ env.SQLITE_DIR }}/lib/pkgconfig:$PKG_CONFIG_PATH" >> $GITHUB_ENV
          echo "SQLITE3_LIB_DIR=${{ env.SQLITE_DIR }}/lib" >> $GITHUB_ENV
          echo "SQLITE3_INCLUDE_DIR=${{ env.SQLITE_DIR }}/include" >> $GITHUB_ENV

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build workspace
        run: cargo build --workspace --release --locked

      - name: Upload server binary
        uses: actions/upload-artifact@v4
        with:
          name: server-aarch64
          path: target/release/server
          retention-days: 7

  # Nix flake check
  nix-check:
    name: Nix Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Setup Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-gha-cache: false
          use-flakehub: false

      - name: Run flake check
        run: nix flake check
